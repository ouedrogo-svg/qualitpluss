{% extends "base.html" %}
{% block title %}{{ title }} — {{ course.title }}{% endblock %}
{% block content %}
<div class="container narrow">
  <h1>{{ title }}</h1>
  <p><a href="{% url 'courses:course_edit' course.slug %}">← Retour à l’édition du SUJET</a></p>
  <form method="post" class="stack-form">
    {% csrf_token %}
    {% for field in form %}
      <div class="form-group">
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% for err in field.errors %}<span class="error">{{ err }}</span>{% endfor %}
      </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary">Enregistrer</button>
  </form>
</div>
{% endblock %}
